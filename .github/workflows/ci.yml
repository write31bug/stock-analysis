name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ---- Python 后端 ----
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install black isort ruff --break-system-packages
      - name: ruff check
        run: ruff check src/stock_analysis backend/ tests/
      - name: black check
        run: black --check src/stock_analysis backend/ tests/
      - name: isort check
        run: isort --check-only src/stock_analysis backend/ tests/

  python-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install --upgrade pip && pip install -e ".[dev]" --break-system-packages
      - name: Run tests
        run: pytest tests/ -v --cov=stock_analysis --cov-report=term-missing
      - name: Check coverage threshold
        run: pytest tests/ --cov=stock_analysis --cov-fail-under=50 -q

  # ---- 前端 ----
  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: ESLint
        run: npx eslint src/
      - name: Prettier check
        run: npx prettier --check "src/**/*.{ts,vue,css}"
      - name: TypeScript check
        run: npx vue-tsc --noEmit
      - name: Build
        run: npm run build
